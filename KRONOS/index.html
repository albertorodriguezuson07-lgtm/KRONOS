<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#00ff41">
<title>KRONOS OMEGA</title>
<style>
:root{
--bg-primary:#000;--bg-secondary:#0a0a0a;--bg-card:#0f0f0f;--bg-modal:#050505;
--color-neon-green:#00ff41;--color-blood-red:#ff0033;--color-gold:#ffd700;
--color-cyan:#00d4ff;--color-purple:#9b59b6;--color-orange:#ff6b00;
--color-white-dim:#ccc;--color-gray:#333;
--glow-green:0 0 10px #00ff41,0 0 20px #00ff41,0 0 40px #00ff4133;
--glow-red:0 0 10px #ff0033,0 0 20px #ff0033,0 0 40px #ff003333;
--glow-gold:0 0 10px #ffd700,0 0 20px #ffd70066;
--glow-cyan:0 0 10px #00d4ff,0 0 20px #00d4ff66;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
background:var(--bg-primary);color:var(--color-neon-green);
font-family:'Courier New','Fira Code',monospace;font-size:14px;
cursor:crosshair;position:relative;
transition:background-color .3s,opacity .1s;
}
body::after{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.03) 2px,rgba(0,255,65,.03) 4px);
pointer-events:none;z-index:9999;
}
body.red-flash{background-color:#ff003322!important;}
body.green-flash{background-color:#00ff4122!important;}
body.flicker{opacity:.7;}

@keyframes glitch{
0%{transform:translate(0);clip-path:inset(0 0 0 0);}
20%{transform:translate(-2px,1px);clip-path:inset(20% 0 60% 0);}
40%{transform:translate(2px,-1px);clip-path:inset(40% 0 20% 0);}
60%{transform:translate(-1px,2px);clip-path:inset(60% 0 10% 0);}
80%{transform:translate(1px,-2px);clip-path:inset(10% 0 80% 0);}
100%{transform:translate(0);clip-path:inset(0 0 0 0);}
}
.glitch{animation:glitch .3s linear;}
@keyframes border-pulse{
0%,100%{border-color:var(--color-gray);}
50%{border-color:var(--color-neon-green);}
}
@keyframes flow{
0%{background-position:0% 50%;}
100%{background-position:200% 50%;}
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes float-up{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-60px);}
}
@keyframes hp-danger{0%,100%{opacity:1;}50%{opacity:.5;}}

#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;}

/* HEADER */
#header{
position:sticky;top:0;z-index:100;background:var(--bg-primary);
padding:8px 12px;border-bottom:1px solid var(--color-gray);
flex-shrink:0;
}
.h-name{font-size:11px;letter-spacing:.3em;color:var(--color-neon-green);text-transform:uppercase;}
.h-title{font-size:10px;color:var(--color-cyan);margin-top:2px;}
.h-level{float:right;color:var(--color-gold);text-shadow:var(--glow-gold);font-size:12px;font-weight:bold;}
.h-bars{margin-top:6px;}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px;}
.bar-label{width:20px;text-align:right;}
.bar-outer{flex:1;height:10px;background:#111;border:1px solid var(--color-gray);border-radius:2px;overflow:hidden;position:relative;}
.bar-inner{height:100%;transition:width .5s;border-radius:2px;}
.bar-hp{background:var(--color-neon-green);}
.bar-hp.warn{background:var(--color-orange);}
.bar-hp.danger{background:var(--color-blood-red);animation:hp-danger 1s infinite;}
.bar-xp{background:linear-gradient(90deg,var(--color-cyan),#0066ff);background-size:200% 100%;animation:flow 2s linear infinite;}
.bar-text{font-size:9px;color:var(--color-white-dim);min-width:50px;text-align:right;}
.h-stats{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;}
.h-gold{color:var(--color-gold);}
.h-streak{color:var(--color-orange);}

/* MAIN CONTENT */
#content{flex:1;overflow-y:auto;padding:10px 12px 10px;-webkit-overflow-scrolling:touch;}
.section{display:none;}
.section.active{display:block;}

/* NAV */
#nav{
position:sticky;bottom:0;z-index:100;background:var(--bg-secondary);
display:flex;border-top:1px solid var(--color-gray);flex-shrink:0;
}
.nav-btn{
flex:1;padding:8px 2px 6px;text-align:center;background:none;border:none;
color:var(--color-white-dim);font-family:inherit;font-size:9px;cursor:crosshair;
transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.nav-btn.active{color:var(--color-neon-green);text-shadow:var(--glow-green);}
.nav-btn svg{width:18px;height:18px;fill:currentColor;}

/* CARDS */
.card{
background:var(--bg-card);border:1px solid var(--color-gray);
border-radius:4px;padding:10px;margin-bottom:8px;
animation:border-pulse 4s infinite;
}
.card-title{font-size:12px;color:var(--color-neon-green);margin-bottom:6px;}

/* BUTTONS */
.btn{
background:none;border:1px solid var(--color-neon-green);color:var(--color-neon-green);
font-family:inherit;font-size:11px;padding:8px 14px;cursor:crosshair;
transition:all .2s;text-transform:uppercase;
}
.btn:hover{background:var(--color-neon-green);color:#000;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-red{border-color:var(--color-blood-red);color:var(--color-blood-red);}
.btn-red:hover{background:var(--color-blood-red);color:#000;}
.btn-gold{border-color:var(--color-gold);color:var(--color-gold);}
.btn-gold:hover{background:var(--color-gold);color:#000;}
.btn-cyan{border-color:var(--color-cyan);color:var(--color-cyan);}
.btn-cyan:hover{background:var(--color-cyan);color:#000;}
.btn-sm{padding:4px 8px;font-size:10px;}
.btn-done{border-color:#006400;color:#006400;cursor:default;}
.btn-block{width:100%;margin-top:6px;}

/* MODAL */
#modal-overlay{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.95);z-index:200;
justify-content:center;align-items:center;padding:20px;
}
#modal-overlay.show{display:flex;}
#modal-box{
background:var(--bg-modal);border:1px solid var(--color-neon-green);
max-width:440px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;
}
.modal-title{font-size:14px;color:var(--color-neon-green);margin-bottom:12px;text-align:center;letter-spacing:.15em;}
.modal-text{font-size:11px;color:var(--color-white-dim);margin-bottom:10px;line-height:1.6;}
.modal-input{
width:100%;background:#0a0a0a;border:1px solid var(--color-gray);color:var(--color-neon-green);
font-family:inherit;font-size:12px;padding:8px;margin-bottom:8px;outline:none;
}
.modal-input:focus{border-color:var(--color-neon-green);}
textarea.modal-input{min-height:60px;resize:vertical;}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap;}

/* TOASTS */
#toast-container{
position:fixed;top:50px;right:10px;z-index:300;display:flex;flex-direction:column;gap:6px;
max-width:300px;pointer-events:none;
}
.toast{
background:var(--bg-modal);border-left:3px solid var(--color-neon-green);
padding:8px 12px;font-size:10px;color:var(--color-white-dim);
animation:toast-in .3s;pointer-events:auto;line-height:1.5;
}
.toast.red{border-color:var(--color-blood-red);}
.toast.orange{border-color:var(--color-orange);}
.toast.cyan{border-color:var(--color-cyan);}
@keyframes toast-in{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}

/* ONBOARDING */
#onboarding{
position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:500;
display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;
}
#ob-text{font-size:13px;color:var(--color-neon-green);white-space:pre-wrap;line-height:1.8;text-align:center;max-width:400px;}
#ob-input{
display:none;width:100%;max-width:300px;background:transparent;border:none;
border-bottom:1px solid var(--color-neon-green);color:var(--color-neon-green);
font-family:inherit;font-size:14px;padding:8px 0;text-align:center;outline:none;
margin-top:20px;
}
.cursor-blink::after{content:'█';animation:blink 1s infinite;}

/* LABYRINTH */
#labyrinth{
position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:400;
display:none;flex-direction:column;justify-content:center;align-items:center;padding:30px;
}
#labyrinth.show{display:flex;}

/* PARTICLES */
.particle{
position:fixed;pointer-events:none;color:var(--color-neon-green);font-size:12px;
font-family:inherit;z-index:150;animation:float-up 1s forwards;
}

/* HEATMAP */
.heatmap{display:flex;flex-wrap:wrap;gap:2px;margin:10px 0;}
.hm-cell{width:10px;height:10px;border-radius:1px;cursor:crosshair;}
.hm-cell:hover{outline:1px solid #fff;}

/* PROGRESS */
.progress-mini{display:inline-block;width:60px;height:6px;background:#111;border-radius:3px;overflow:hidden;vertical-align:middle;}
.progress-mini-bar{height:100%;background:var(--color-cyan);transition:width .3s;}

/* TABS */
.tab-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.tab-btn{
font-family:inherit;font-size:10px;padding:4px 8px;background:none;
border:1px solid var(--color-gray);color:var(--color-white-dim);cursor:crosshair;
}
.tab-btn.active{border-color:var(--color-cyan);color:var(--color-cyan);}

.sep{border:none;border-top:1px solid var(--color-gray);margin:10px 0;}
.text-red{color:var(--color-blood-red);}
.text-green{color:var(--color-neon-green);}
.text-gold{color:var(--color-gold);}
.text-cyan{color:var(--color-cyan);}
.text-orange{color:var(--color-orange);}
.text-dim{color:var(--color-white-dim);}
.text-purple{color:var(--color-purple);}
.text-xs{font-size:9px;}
.text-sm{font-size:10px;}
.text-center{text-align:center;}
.mt4{margin-top:4px;}
.mt8{margin-top:8px;}
.mb4{margin-bottom:4px;}
.mb8{margin-bottom:8px;}
.flex{display:flex;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.gap4{gap:4px;}
.gap8{gap:8px;}
.hidden{display:none!important;}
.w100{width:100%;}
.countdown-urgent{color:var(--color-blood-red);animation:blink 1s infinite;}

select.modal-input{appearance:none;cursor:crosshair;}
input[type="number"].modal-input{-moz-appearance:textfield;}
input[type="number"].modal-input::-webkit-inner-spin-button{-webkit-appearance:none;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#000;}
::-webkit-scrollbar-thumb{background:var(--color-gray);border-radius:2px;}

@media(min-width:481px){
#app{border-left:1px solid var(--color-gray);border-right:1px solid var(--color-gray);}
}
</style>
</head>
<body>

<div id="onboarding" class="hidden"></div>
<div id="labyrinth"></div>

<div id="app" class="hidden">
  <div id="header"></div>
  <div id="content">
    <div id="sec-codigo" class="section"></div>
    <div id="sec-infracciones" class="section"></div>
    <div id="sec-objetivos" class="section"></div>
    <div id="sec-skills" class="section"></div>
    <div id="sec-bunker" class="section"></div>
    <div id="sec-perfil" class="section"></div>
  </div>
  <div id="nav"></div>
</div>

<div id="modal-overlay"><div id="modal-box"></div></div>
<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════
   KRONOS OMEGA v3.0 — SISTEMA COMPLETO
   ═══════════════════════════════════════════ */

// ─── UTILS ───
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const uuid=()=>crypto.randomUUID?crypto.randomUUID():'x'+Date.now()+Math.random().toString(36).slice(2,9);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const today=()=>new Date().toDateString();
const isoNow=()=>new Date().toISOString();
const dateStr=(d)=>{const x=new Date(d);return x.toLocaleDateString('es-ES');}
const timeStr=(d)=>{const x=new Date(d);return x.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
const daysBetween=(a,b)=>Math.floor((new Date(b)-new Date(a))/864e5);

// ─── AUDIO SYSTEM ───
const Audio={
  ctx:null,
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
  play(type){
    this.resume();
    if(!this.ctx)return;
    const c=this.ctx,t=c.currentTime;
    try{
      if(type==='success'){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.frequency.setValueAtTime(330,t);
        o.frequency.exponentialRampToValueAtTime(660,t+.15);
        g.gain.setValueAtTime(.2,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.3);
        o.start(t);o.stop(t+.3);
      }else if(type==='damage'){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);o.type='sawtooth';
        o.frequency.setValueAtTime(300,t);
        o.frequency.exponentialRampToValueAtTime(80,t+.4);
        g.gain.setValueAtTime(.25,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.5);
        o.start(t);o.stop(t+.5);
      }else if(type==='levelup'){
        [440,554,659].forEach((f,i)=>{
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.frequency.setValueAtTime(f,t+i*.15);
          g.gain.setValueAtTime(.2,t+i*.15);
          g.gain.exponentialRampToValueAtTime(.001,t+i*.15+.3);
          o.start(t+i*.15);o.stop(t+i*.15+.3);
        });
      }else if(type==='gameover'){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);o.type='sawtooth';
        o.frequency.setValueAtTime(200,t);
        o.frequency.exponentialRampToValueAtTime(40,t+1.5);
        g.gain.setValueAtTime(.3,t);
        g.gain.exponentialRampToValueAtTime(.001,t+2);
        o.start(t);o.stop(t+2);
      }else if(type==='alarm'){
        for(let i=0;i<6;i++){
          const o=c.createOscillator(),g=c.createGain();
          o.connect(g);g.connect(c.destination);
          o.frequency.setValueAtTime(800,t+i*.2);
          g.gain.setValueAtTime(.15,t+i*.2);
          g.gain.exponentialRampToValueAtTime(.001,t+i*.2+.1);
          o.start(t+i*.2);o.stop(t+i*.2+.15);
        }
      }else if(type==='buy'){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);o.type='triangle';
        o.frequency.setValueAtTime(500,t);
        o.frequency.exponentialRampToValueAtTime(800,t+.1);
        o.frequency.exponentialRampToValueAtTime(500,t+.2);
        g.gain.setValueAtTime(.15,t);
        g.gain.exponentialRampToValueAtTime(.001,t+.3);
        o.start(t);o.stop(t+.3);
      }
    }catch(e){}
  }
};

// ─── STATE MANAGEMENT ───
const KEYS={
  player:'kronos_player',habitos:'kronos_habitos',infracciones:'kronos_infracciones',
  objetivos:'kronos_objetivos',skills:'kronos_skills',log:'kronos_log',
  muertos:'kronos_muertos',manifiesto:'kronos_manifiesto',valores:'kronos_valores',
  capsula:'kronos_capsula',mercado:'kronos_mercado',config:'kronos_config',
  heatmap:'kronos_heatmap',diario:'kronos_diario',bunkerHistory:'kronos_bunker'
};

function save(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch(e){}}
function load(key,def){try{const d=localStorage.getItem(key);return d?JSON.parse(d):def;}catch(e){return def;}}

// ─── DEFAULT DATA ───
function defaultPlayer(name){
  return{
    userName:name,startDate:isoNow(),nivel:1,xp:0,xpParaSiguienteNivel:500,
    hp:100,hpMax:100,oro:0,racha:0,ultimoLogin:null,totalMuertes:0,
    mejorRacha:0,titulo:'INICIADO',modoHardcore:false,modoMonje:false,
    modoMonjeDias:0,modoMonjeInicio:null,perfilPsicologico:{},
    onboardingComplete:true,labyrinthDone:null,precioDeHoy:null,
    capsulaDone:false,modoSupervivencia:[],semanaActual:getWeekNum()
  };
}

function defaultHabitos(){
  return[
    {id:uuid(),nombre:'Hacer la cama',xpReward:10,goldReward:5,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Entrenamiento',xpReward:50,goldReward:25,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Comer Sano',xpReward:20,goldReward:10,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Leer 30 min',xpReward:30,goldReward:15,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Deep Work 1h',xpReward:100,goldReward:50,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Meditación',xpReward:25,goldReward:10,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Sin redes sociales hoy',xpReward:40,goldReward:20,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null},
    {id:uuid(),nombre:'Dormir antes de las 23h',xpReward:35,goldReward:15,tipo:'daily',completadoHoy:false,streak:0,totalCompletado:0,ultimaVez:null}
  ];
}

function defaultInfracciones(){
  return[
    {id:uuid(),nombre:'Porno',hpCost:50,multiplicadorRepeticion:2,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'TikTok/Reels',hpCost:15,multiplicadorRepeticion:1.5,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'Comida Basura',hpCost:20,multiplicadorRepeticion:1.3,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'Procrastinación',hpCost:10,multiplicadorRepeticion:1.2,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'No trabajar',hpCost:30,multiplicadorRepeticion:2,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'Alcohol',hpCost:25,multiplicadorRepeticion:2,contadorHoy:0,contadorTotal:0,ultimaVez:null},
    {id:uuid(),nombre:'Trasnochar',hpCost:20,multiplicadorRepeticion:1.5,contadorHoy:0,contadorTotal:0,ultimaVez:null}
  ];
}

function defaultMercado(){
  return[
    {id:uuid(),nombre:'1h Videojuegos',coste:100,desc:'Permiso para 1 hora sin culpa'},
    {id:uuid(),nombre:'Cena Trampa',coste:300,desc:'Una comida libre'},
    {id:uuid(),nombre:'Serie/Película',coste:200,desc:'2 horas de entretenimiento'},
    {id:uuid(),nombre:'Día de Descanso',coste:500,desc:'Un día sin registrar El Código'},
    {id:uuid(),nombre:'Borrar 1 Infracción',coste:800,desc:'Elimina 1 infracción del historial de HOY'},
    {id:uuid(),nombre:'Resetear Deuda',coste:1000,desc:'Cancela la deuda activa pendiente'},
    {id:uuid(),nombre:'Revivir',coste:2000,desc:'Evita el reset total al morir una vez'}
  ];
}

function defaultValores(){
  return['Salud','Familia','Dinero','Conocimiento','Libertad','Disciplina','Amor'];
}

function getWeekNum(){
  const d=new Date();const start=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-start)/864e5+start.getDay()+1)/7);
}

// ─── GLOBAL STATE ───
let P,habitos,infracciones,objetivos,skills,combatLog,muertos,manifiesto,valores,capsula,mercado,config,heatmap,diario,bunkerHistory;
let currentSection='codigo';
let bunkerTimer=null;
let bunkerTimeLeft=0;
let bunkerRunning=false;
let bunkerEscapes=0;

function loadAll(){
  P=load(KEYS.player,null);
  habitos=load(KEYS.habitos,defaultHabitos());
  infracciones=load(KEYS.infracciones,defaultInfracciones());
  objetivos=load(KEYS.objetivos,[]);
  skills=load(KEYS.skills,[]);
  combatLog=load(KEYS.log,[]);
  muertos=load(KEYS.muertos,[]);
  manifiesto=load(KEYS.manifiesto,'');
  valores=load(KEYS.valores,defaultValores());
  capsula=load(KEYS.capsula,null);
  mercado=load(KEYS.mercado,defaultMercado());
  config=load(KEYS.config,{personalidad:'kronos',pruebaDeVida:false,sonido:true});
  heatmap=load(KEYS.heatmap,{});
  diario=load(KEYS.diario,[]);
  bunkerHistory=load(KEYS.bunkerHistory,{sesiones:[],escapes:[]});
}

function saveAll(){
  save(KEYS.player,P);save(KEYS.habitos,habitos);save(KEYS.infracciones,infracciones);
  save(KEYS.objetivos,objetivos);save(KEYS.skills,skills);save(KEYS.log,combatLog);
  save(KEYS.muertos,muertos);save(KEYS.manifiesto,manifiesto);save(KEYS.valores,valores);

  save(KEYS.heatmap,heatmap);save(KEYS.diario,diario);save(KEYS.bunkerHistory,bunkerHistory);
}

// ─── TYPING EFFECT ───
function typeText(el,text,speed=35){
  return new Promise(resolve=>{
    el.textContent='';let i=0;
    const iv=setInterval(()=>{
      if(i<text.length){el.textContent+=text[i];i++;}
      else{clearInterval(iv);resolve();}
    },speed);
  });
}

// ─── TOAST SYSTEM ───
const toastQueue=[];
let activeToasts=0;
function showToast(msg,type='green',duration=4000){
  const c=$('#toast-container');
  if(activeToasts>=3){toastQueue.push({msg,type,duration});return;}
  const t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  c.appendChild(t);activeToasts++;
  setTimeout(()=>{t.remove();activeToasts--;
    if(toastQueue.length){const n=toastQueue.shift();showToast(n.msg,n.type,n.duration);}
  },duration);
}

// ─── VISUAL EFFECTS ───
function flashScreen(type){
  document.body.classList.add(type);
  setTimeout(()=>document.body.classList.remove(type),300);
}
function flickerScreen(){
  document.body.classList.add('flicker');
  setTimeout(()=>document.body.classList.remove('flicker'),150);
}
function glitchEl(el){el.classList.add('glitch');setTimeout(()=>el.classList.remove('glitch'),300);}
function spawnParticles(text,color){
  for(let i=0;i<5;i++){
    const p=document.createElement('div');
    p.className='particle';p.textContent=text;
    p.style.left=Math.random()*60+20+'%';
    p.style.top=Math.random()*30+40+'%';
    p.style.color=color||'var(--color-neon-green)';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

// ─── MODAL SYSTEM ───
function showModal(html){
  $('#modal-box').innerHTML=html;
  $('#modal-overlay').classList.add('show');
}
function closeModal(){$('#modal-overlay').classList.remove('show');}
$('#modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ─── COMBAT LOG ───
function addLog(msg){
  const now=new Date();
  const ts=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  combatLog.push({time:isoNow(),ts,msg});
  if(combatLog.length>500)combatLog=combatLog.slice(-300);
  save(KEYS.log,combatLog);
}

// ─── RPG ENGINE ───
function getStreakMultiplier(){
  if(P.racha>=30)return 3;
  if(P.racha>=14)return 2.5;
  if(P.racha>=7)return 2;
  if(P.racha>=3)return 1.5;
  return 1;
}

function addXP(amount){
  const mult=getStreakMultiplier();
  const total=Math.round(amount*mult);
  P.xp+=total;
  checkLevelUp();
  saveAll();renderHeader();
  return total;
}

function addGold(amount){
  P.oro+=amount;
  saveAll();renderHeader();
}

function checkLevelUp(){
  while(P.xp>=P.xpParaSiguienteNivel){
    P.xp-=P.xpParaSiguienteNivel;
    P.nivel++;
    P.hpMax+=10;
    P.hp=Math.min(P.hp+20,P.hpMax);
    P.xpParaSiguienteNivel=500+(P.nivel-1)*200;
    Audio.play('levelup');
    addLog('NIVEL UP → NIVEL '+P.nivel);
    showLevelUpModal();
  }
}

function showLevelUpModal(){
  // Check recent infractions
  const recentInf=combatLog.filter(l=>l.msg.includes('INFRACCIÓN')).slice(-1);
  let preMsg='';
  if(recentInf.length>0){
    preMsg=`<div class="text-dim text-sm mb8" style="line-height:1.6;">ANTES DE CELEBRAR EL NIVEL ${P.nivel}...<br><br>Recuerda que recientemente registraste infracciones.<br>Este nivel es a pesar de ese hombre.<br>No olvides quién eres capaz de ser.</div><hr class="sep">`;
  }
  showModal(`
    <div class="modal-title glitch" style="color:var(--color-gold);text-shadow:var(--glow-gold);">═══ ASCENSO ═══</div>
    ${preMsg}
    <div class="text-center">
      <div style="font-size:28px;color:var(--color-gold);text-shadow:var(--glow-gold);">NIVEL ${P.nivel}</div>
      <div class="text-dim mt8">+10 HP Máx | HP restaurado</div>
      <div class="text-dim mt4">XP necesario: ${P.xpParaSiguienteNivel}</div>
    </div>
    <div class="modal-actions"><button class="btn btn-gold" onclick="closeModal()">CONTINUAR</button></div>
  `);
}

function takeDamage(amount,source){
  const isHardcore=P.modoHardcore;
  const dmg=isHardcore?amount*2:amount;
  P.hp=Math.max(0,P.hp-dmg);
  flickerScreen();flashScreen('red-flash');
  Audio.play('damage');
  addLog(`DAÑO: -${dmg} HP (${source})`);
  if(P.hp<=0)triggerGameOver();
  saveAll();renderHeader();
  // HP low warnings
  if(P.hp>0&&P.hp<=30){
    const msgs=[
      `SISTEMA EN ESTADO CRÍTICO. ¿VAS A MORIR OTRA VEZ, ${P.userName}?`,
      `TU HP ES UNA VERGÜENZA. ACTÚA.`,
      `EL COLAPSO ESTÁ A ${P.hp} HP. REACCIONA O MUERE.`,
      `ESTO NO ES UN JUEGO. TU SISTEMA SE ESTÁ CAYENDO.`,
      `ÚLTIMA ADVERTENCIA ANTES DEL REINICIO TOTAL.`
    ];
    showToast(msgs[Math.floor(Math.random()*msgs.length)],'red',6000);
  }
}

function triggerGameOver(){
  Audio.play('gameover');
  try{navigator.vibrate([500,200,500]);}catch(e){}
  // Check for revive item
  const purchased=load('kronos_revive',false);
  if(purchased){
    save('kronos_revive',false);
    P.hp=Math.round(P.hpMax*.3);
    showToast('REVIVIR ACTIVADO. Has escapado de la muerte.','orange',5000);
    saveAll();renderHeader();return;
  }
  const lastInfs=combatLog.filter(l=>l.msg.includes('INFRACCIÓN')).slice(-5);
  const muerte={
    muerte:P.totalMuertes+1,fecha:isoNow(),nivel:P.nivel,oro:P.oro,
    racha:P.racha,duracion:daysBetween(P.startDate,new Date()),
    causa:lastInfs.length?lastInfs[lastInfs.length-1].msg:'Acumulación de daño',
    topInfracciones:getTopInfracciones()
  };
  muertos.push(muerte);save(KEYS.muertos,muertos);
  
  showModal(`
    <div style="text-align:center;">
      <div class="glitch" style="font-size:18px;color:var(--color-blood-red);text-shadow:var(--glow-red);letter-spacing:.2em;">SISTEMA REINICIADO</div>
      <div class="text-red mt8">HAS SIDO PURGADO, ${P.userName}.</div>
      <hr class="sep">
      <div class="text-dim text-sm" style="text-align:left;line-height:1.8;">
        ANÁLISIS DE CAUSA DE MUERTE<br>
        ════════════════════════════<br>
        Duración de esta vida: ${muerte.duracion} días<br>
        Nivel alcanzado: ${muerte.nivel}<br>
        Oro acumulado: ${muerte.oro}<br>
        <br>Infracciones fatales:<br>
        ${lastInfs.map(l=>'→ '+l.msg).join('<br>')||'→ Daño acumulado'}
      </div>
      <div class="modal-actions mt8"><button class="btn btn-red" onclick="acceptDeath()">ACEPTAR MI DERROTA</button></div>
    </div>
  `);
}

function getTopInfracciones(){
  const counts={};
  infracciones.forEach(i=>{if(i.contadorTotal>0)counts[i.nombre]=i.contadorTotal;});
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,c])=>`${n} x${c}`);
}

function acceptDeath(){
  P.totalMuertes++;
  P.nivel=1;P.xp=0;P.xpParaSiguienteNivel=500;
  P.oro=0;P.hp=Math.round(100*.5);P.hpMax=100;P.racha=0;
  if(P.modoHardcore){objetivos=[];save(KEYS.objetivos,objetivos);}
  saveAll();closeModal();renderAll();
  addLog('MUERTE #'+P.totalMuertes+' — Sistema reiniciado');
}

function calculateTitle(){
  const infThisWeek=combatLog.filter(l=>{
    if(!l.msg.includes('INFRACCIÓN'))return false;
    return daysBetween(l.time,new Date())<=7;
  }).length;
  const infThisMonth=combatLog.filter(l=>{
    if(!l.msg.includes('INFRACCIÓN'))return false;
    return daysBetween(l.time,new Date())<=30;
  }).length;
  const codigoConsecutivo=habitos.filter(h=>h.streak>=5).length===habitos.length;
  const lastLogin=P.ultimoLogin?daysBetween(P.ultimoLogin,new Date()):0;

  if(lastLogin>=2)return'DESERTOR';
  if(P.hp<P.hpMax*.2)return'EN LA CUERDA FLOJA';
  if(P.nivel>=20)return'LEYENDA VIVIENTE';
  if(P.nivel>=10)return'VETERANO';
  if(P.racha>=30)return'MÁQUINA DE GUERRA';
  if(infThisMonth===0&&P.nivel>=3)return'INCORRUPTIBLE';
  if(P.racha>=7)return'SEMANA PERFECTA';
  if(codigoConsecutivo)return'PROTOCOLO ACTIVO';
  if(P.totalMuertes>=3)return'FÉNIX ROTO';
  if(P.nivel>=5&&infThisWeek===0)return'MONJE DIGITAL';
  if(P.nivel>=5&&infThisWeek>=5)return'ADICTO EN RECUPERACIÓN';
  if(P.modoHardcore)return'SOBREVIVIENTE HARDCORE';
  return'OPERATIVO';
}

  const xpPct=Math.round(P.xp/P.xpParaSiguienteNivel*100);
  const hpClass=hpPct>60?'bar-hp':hpPct>30?'bar-hp warn':'bar-hp danger';
  
  $('#header').innerHTML=`
    <div class="flex-between">
      <div>
        <div class="h-name">AGENTE ${P.userName.toUpperCase()}</div>
        <div class="h-title">[${P.titulo}]</div>
      </div>
      <div class="h-level">NIV ${P.nivel}</div>
    </div>
    <div class="h-bars">
      <div class="bar-row">
        <span class="bar-label text-green">HP</span>
        <div class="bar-outer"><div class="${hpClass}" style="width:${hpPct}%"></div></div>
        <span class="bar-text">${P.hp}/${P.hpMax}</span>
      </div>
      <div class="bar-row">
        <span class="bar-label text-cyan">XP</span>

// ─── RENDER SECTIONS ───
function renderSection(sec){
  switch(sec){
    case'codigo':renderCodigo();break;
    case'infracciones':renderInfracciones();break;
    case'objetivos':renderObjetivos();break;

// ─── EL CÓDIGO (HÁBITOS) ───
function renderCodigo(){
  const mult=getStreakMultiplier();
  const completados=habitos.filter(h=>h.completadoHoy).length;
  const total=habitos.length;
  
  let html=`<div class="text-cyan text-sm mb8">EL CÓDIGO — PROTOCOLOS DIARIOS (${completados}/${total})</div>`;
  html+=`<div class="text-dim text-xs mb8">MULTIPLICADOR RACHA: x${mult} ${P.racha>0?'('+P.racha+' días)':''}</div>`;
  
  habitos.forEach(h=>{
    const isDone=h.completadoHoy&&h.tipo==='daily';
    const xpDisplay=Math.round(h.xpReward*mult);
    html+=`<div class="card">
      <div class="flex-between">
        <div>
          <span class="${isDone?'text-dim':'text-green'}" style="cursor:crosshair;" onclick="editHabito('${h.id}')">${h.nombre}</span>
          <span class="text-xs text-dim"> [${h.tipo==='daily'?'DIARIO':'∞'}]</span>
          ${h.streak>0?`<span class="text-xs text-orange"> 🔥${h.streak}</span>`:''}
        </div>
        <div class="flex gap4">
          <button class="btn btn-sm${isDone?' btn-done':''}" ${isDone?'disabled':''}
            onclick="completarHabito('${h.id}')">
            ${isDone?'✓ HECHO':`+${xpDisplay} XP`}
          </button>
          <button class="btn btn-sm btn-red" onclick="eliminarHabito('${h.id}')">✕</button>
        </div>
      </div>
      <div class="text-xs text-dim mt4">Total: ${h.totalCompletado} | +${h.goldReward} Oro</div>
    </div>`;
  });
  
  html+=`<button class="btn btn-cyan btn-block" onclick="modalAddHabito()">+ AÑADIR PROTOCOLO</button>`;
  
  if(completados===total&&total>0){
    html+=`<div class="card mt8" style="border-color:var(--color-neon-green);text-align:center;">
      <span class="text-green">✦ CÓDIGO COMPLETO ✦</span>
    </div>`;
  }
  
  $('#sec-codigo').innerHTML=html;
}

function completarHabito(id){
  Audio.resume();
  const h=habitos.find(x=>x.id===id);
  if(!h||h.completadoHoy&&h.tipo==='daily')return;
  
  if(config.pruebaDeVida&&h.xpReward>50){
    showModal(`
      <div class="modal-title">VERIFICACIÓN REQUERIDA</div>
      <div class="modal-text">Escribe: "COMPLETADO POR MI HONOR"</div>
      <input class="modal-input" id="pv-input" placeholder="Escribe aquí...">
      <div class="modal-actions">
        <button class="btn" onclick="confirmarPruebaVida('${id}')">CONFIRMAR</button>
        <button class="btn btn-red" onclick="closeModal()">CANCELAR</button>
      </div>
    `);
    return;
  }
  ejecutarCompletarHabito(id);
}

function confirmarPruebaVida(id){
  const v=$('#pv-input').value.trim().toUpperCase();
  if(v==='COMPLETADO POR MI HONOR'){closeModal();ejecutarCompletarHabito(id);}
  else{showToast('VERIFICACIÓN FALLIDA. Intenta de nuevo.','red');}
}

function ejecutarCompletarHabito(id){
  const h=habitos.find(x=>x.id===id);
  if(!h)return;
  
  h.completadoHoy=true;h.totalCompletado++;h.ultimaVez=isoNow();
  // Streak logic: if completed yesterday too
  const ayer=new Date();ayer.setDate(ayer.getDate()-1);
  h.streak++;
  
  const mult=getStreakMultiplier();
  const xpGained=addXP(h.xpReward);
  addGold(Math.round(h.goldReward*mult));
  
  flashScreen('green-flash');Audio.play('success');
  spawnParticles('+ XP +','var(--color-neon-green)');
  
  const msg=`${h.nombre} completado. +${xpGained} XP. Racha: ${h.streak} días. Mult: x${mult}`;
  showToast(msg,'green');
  addLog(`CÓDIGO: "${h.nombre}" completado. +${xpGained} XP. Racha: ${h.streak}.`);
  
  // Check all complete
  if(habitos.every(x=>x.completadoHoy)){
    const msgs=[
      `CÓDIGO COMPLETO. ERES DIFERENTE A LA MAYORÍA.`,
      `DÍA LIMPIO. ESTO SE CONSTRUYE ASÍ.`,
      `PERFECCIÓN OPERATIVA. NIVEL ${P.nivel} OPERATIVO.`
    ];
    setTimeout(()=>showToast(msgs[Math.floor(Math.random()*msgs.length)],'cyan',5000),1500);
  }
  
  updateHeatmapToday();saveAll();renderCodigo();
}

function modalAddHabito(){

    <input class="modal-input" id="hab-nombre" placeholder="Nombre del hábito">
    <input class="modal-input" id="hab-xp" type="number" placeholder="XP Recompensa" value="25">

function editHabito(id){

// ─── INFRACCIONES ───
function renderInfracciones(){
  const infHoy=infracciones.reduce((s,i)=>s+i.contadorHoy,0);
  let html=`<div class="text-red text-sm mb8">INFRACCIONES — REGISTRO DE DAÑO</div>`;
  html+=`<div class="text-dim text-xs mb8">INFRACCIONES HOY: ${infHoy} ${infHoy>=2?`(próxima costará x2)`:''}</div>`;

        <div>

        </div>
      </div>
      <div class="text-xs text-dim mt4">Total histórico: ${inf.contadorTotal}</div>
    </div>`;
  });
  
  html+=`<button class="btn btn-red btn-block" onclick="modalAddInfraccion()">+ AÑADIR INFRACCIÓN</button>`;
  $('#sec-infracciones').innerHTML=html;
}

function registrarInfraccion(id){
  Audio.resume();
  const inf=infracciones.find(x=>x.id===id);if(!inf)return;
  
  const infHoy=infracciones.reduce((s,i)=>s+i.contadorHoy,0);
  const domino=infHoy>=3?2:infHoy>=2?1.5:1;
  const costoEfectivo=Math.round(inf.hpCost*(inf.contadorHoy>0?inf.multiplicadorRepeticion:1)*domino);
  
  if(P.modoHardcore){
    // No confirmation in hardcore
    doRegistrarInfraccion(id,'Modo Hardcore — sin excusas',costoEfectivo);
    return;
  }
  
  showModal(`
    <div class="modal-title text-red">═══ PROTOCOLO DE CONFESIÓN ═══</div>
    <div class="modal-text">
      Estás a punto de registrar:<br>
      <strong class="text-red">"${inf.nombre.toUpperCase()}"</strong><br>
      Costo: <strong class="text-red">-${costoEfectivo} HP</strong>
      ${inf.contadorHoy>0?'<br><span class="text-orange">REPETICIÓN DETECTADA — Multiplicador activo</span>':''}
    </div>
    <div class="modal-text">¿Por qué lo hiciste?</div>
    <textarea class="modal-input" id="conf-razon" placeholder="Obligatorio — sé honesto..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-red" onclick="confirmarInfraccion('${id}',${costoEfectivo})">CONFESAR Y PAGAR</button>
      <button class="btn" onclick="closeModal()">CANCELAR</button>
    </div>
  `);
}

function confirmarInfraccion(id,costo){
  const razon=$('#conf-razon').value.trim();
  if(!razon){showToast('Debes escribir una razón.','red');return;}
  closeModal();
  doRegistrarInfraccion(id,razon,costo);
}

function doRegistrarInfraccion(id,razon,costo){
  const inf=infracciones.find(x=>x.id===id);if(!inf)return;
  inf.contadorHoy++;inf.contadorTotal++;inf.ultimaVez=isoNow();
  
  takeDamage(costo,inf.nombre);
  
  // Messages based on repeat count
  const msgs2=['¿DE NUEVO? PATÉTICO.','PREDECIBLE. EXACTAMENTE LO QUE SE ESPERABA DE TI.'];
  const msgs3=['TU COMPETENCIA ESTÁ GANANDO MIENTRAS TÚ TE DESTRUYES.','REGISTRADO. KRONOS LO RECUERDA TODO.'];
  
  if(inf.contadorHoy===2)showToast(msgs2[Math.floor(Math.random()*msgs2.length)],'red',5000);
  if(inf.contadorHoy>=3)showToast(msgs3[Math.floor(Math.random()*msgs3.length)],'red',6000);
  if(inf.contadorHoy===1){
    const m=['OTRO DÍA MANCHADO. ¿CUÁNTAS VECES MÁS?','EL SISTEMA NO OLVIDA. TÚ TAMPOCO DEBERÍAS.','REGISTRADO. KRONOS LO RECUERDA TODO.'];
    showToast(m[Math.floor(Math.random()*m.length)],'red');
  }
  
  addLog(`INFRACCIÓN: ${inf.nombre}. -${costo} HP. Razón: "${razon}"`);
  updateHeatmapToday();saveAll();renderInfracciones();
}

function renderObjetivos(){
  const tipos=['semanal','mensual','trimestral','anual'];
  const labels={semanal:'SEMANAL',mensual:'MENSUAL',trimestral:'TRIMESTRAL',anual:'ANUAL'};
  const rewards={semanal:{xp:200,oro:100},mensual:{xp:500,oro:300},trimestral:{xp:1500,oro:800},anual:{xp:5000,oro:2500}};
  
  let html=`<div class="text-cyan text-sm mb8">OBJETIVOS — THE LONG GAME</div>`;
  
  tipos.forEach(tipo=>{
    const objs=objetivos.filter(o=>o.tipo===tipo);
    html+=`<div class="card">
      <div class="card-title" onclick="this.nextElementSibling.classList.toggle('hidden')" style="cursor:crosshair;">
        ${labels[tipo]} (${objs.length}) ▾
      </div>
      <div>`;
    objs.forEach(o=>{
      const diasRestantes=daysBetween(new Date(),o.fechaLimite);
      const urgente=diasRestantes<=3&&diasRestantes>=0;
      const vencido=diasRestantes<0&&!o.completado&&!o.fallado;
      if(vencido&&!o.fallado){o.fallado=true;if(o.apuesta)P.oro=Math.max(0,P.oro-o.apuesta);saveAll();}
      
      html+=`<div class="card" style="border-color:${o.completado?'var(--color-neon-green)':o.fallado?'var(--color-blood-red)':'var(--color-gray)'};">
        <div class="flex-between mb4">
          <span class="${o.completado?'text-green':o.fallado?'text-red':'text-dim'}">${o.titulo}</span>
          <span class="text-xs ${o.completado?'text-green':o.fallado?'text-red':urgente?'countdown-urgent':'text-dim'}">
            ${o.completado?'✓ COMPLETADO':o.fallado?'✗ FALLADO':diasRestantes>=0?diasRestantes+'d restantes':'VENCIDO'}
          </span>
        </div>
        ${o.condicionVictoria?`<div class="text-xs text-dim">${o.condicionVictoria}</div>`:''}
        ${o.apuesta?`<div class="text-xs text-gold mt4">Apuesta: ${o.apuesta} Oro</div>`:''}
        ${!o.completado&&!o.fallado?`
          <div class="flex gap4 mt4">
            <button class="btn btn-sm" onclick="completarObjetivo('${o.id}')">COMPLETADO</button>
            <button class="btn btn-sm btn-red" onclick="fallarObjetivo('${o.id}')">FALLADO</button>
          </div>
        `:''}
      </div>`;
    });
    html+=`</div></div>`;
  });
  
  html+=`<button class="btn btn-cyan btn-block" onclick="modalAddObjetivo()">+ NUEVO OBJETIVO</button>`;
  $('#sec-objetivos').innerHTML=html;
}

function completarObjetivo(id){
  const o=objetivos.find(x=>x.id===id);if(!o||o.completado)return;
  o.completado=true;
  const rewards={semanal:{xp:200,oro:100},mensual:{xp:500,oro:300},trimestral:{xp:1500,oro:800},anual:{xp:5000,oro:2500}};
  const r=rewards[o.tipo]||rewards.mensual;
  addXP(r.xp);addGold(r.oro+(o.apuesta||0));
  Audio.play('levelup');
  spawnParticles('✦ GOAL ✦','var(--color-gold)');
  showModal(`
    <div class="text-center">
      <div class="text-gold" style="font-size:16px;">✦ OBJETIVO COMPLETADO ✦</div>
      <div class="text-green mt8">"${o.titulo}"</div>
      <div class="text-dim mt4">+${r.xp} XP | +${r.oro+(o.apuesta||0)} Oro</div>
      <div class="modal-actions"><button class="btn btn-gold" onclick="closeModal()">CONTINUAR</button></div>
    </div>
  `);
  addLog(`OBJETIVO COMPLETADO: "${o.titulo}" +${r.xp} XP`);
  saveAll();
}

function fallarObjetivo(id){
  const o=objetivos.find(x=>x.id===id);if(!o)return;
  o.fallado=true;
  if(o.apuesta){P.oro=Math.max(0,P.oro-o.apuesta);showToast(`Apuesta perdida: -${o.apuesta} Oro`,'red');}
  addLog(`OBJETIVO FALLADO: "${o.titulo}"`);

}

    sk.subskills.forEach((sub,i)=>{
      const xpPer=total?Math.round(sk.valorTotal/total):0;
      html+=`<div class="flex-between mt4">
        <label class="text-xs ${sub.completada?'text-green':'text-dim'}" style="cursor:crosshair;">
          <input type="checkbox" ${sub.completada?'checked':''} onchange="toggleSubskill('${sk.id}','${sub.id}',${xpPer})">

  $('#sec-skills').innerHTML=html;
}

function toggleSubskill(skId,subId,xp){
  const sk=skills.find(x=>x.id===skId);if(!sk)return;
  const sub=sk.subskills.find(x=>x.id===subId);if(!sub)return;
  sub.completada=!sub.completada;
  if(sub.completada){addXP(xp);addGold(Math.round(xp/2));Audio.play('success');showToast(`Subskill completada: +${xp} XP`,'cyan');}
  const all=sk.subskills.every(s=>s.completada);
  if(all&&!sk.completada){
    sk.completada=true;
    showToast(`SKILL "${sk.nombre}" COMPLETADO!`,'cyan',5000);
    Audio.play('levelup');
  }
  saveAll();renderSkills();
}

function renderBunker(){
  const sesHoy=bunkerHistory.sesiones.filter(s=>new Date(s.fecha).toDateString()===today()).length;

  const sesSemana=bunkerHistory.sesiones.filter(s=>daysBetween(s.fecha,new Date())<=7).length;
  
  let html=`
    <div class="card" style="border-color:var(--color-cyan);text-align:center;">
      <div class="text-cyan" style="font-size:12px;letter-spacing:.2em;">PROTOCOLO BUNKER</div>
      <div class="text-dim text-xs mt4">FOCO TOTAL ACTIVADO</div>
      <hr class="sep">
      <div id="bunker-display" style="font-size:36px;color:var(--color-cyan);text-shadow:var(--glow-cyan);margin:15px 0;">
        ${bunkerRunning?formatTime(bunkerTimeLeft):'00:00'}
      </div>
      ${!bunkerRunning?`
        <div class="mb8">
          <input class="modal-input" id="bunker-mins" type="number" value="25" min="1" max="180" style="text-align:center;width:80px;display:inline-block;">
          <span class="text-dim text-xs"> minutos</span>
        </div>
        <button class="btn btn-cyan" onclick="startBunker()">INICIAR SESIÓN</button>
      `:`
        <div class="text-dim text-xs mb8">HP en riesgo: -10 por escape</div>
        <button class="btn btn-red" onclick="cancelBunker()">ABORTAR MISIÓN</button>
      `}
      <hr class="sep">
      <div class="text-dim text-xs" style="text-align:left;">
        HOY: ${sesHoy} sesiones (${minHoy} min de foco)<br>
        ESTA SEMANA: ${sesSemana} sesiones<br>
        ESCAPES TOTALES: ${bunkerHistory.escapes.length}
      </div>
    </div>
  `;
  $('#sec-bunker').innerHTML=html;
}

function formatTime(secs){
  const m=Math.floor(secs/60).toString().padStart(2,'0');
  const s=(secs%60).toString().padStart(2,'0');
  return m+':'+s;
}

function startBunker(){
  Audio.resume();
  const mins=parseInt($('#bunker-mins')?.value)||25;
  bunkerTimeLeft=mins*60;
  bunkerRunning=true;
  bunkerEscapes=0;
  
  bunkerTimer=setInterval(()=>{
    bunkerTimeLeft--;
    const d=$('#bunker-display');
    if(d)d.textContent=formatTime(bunkerTimeLeft);
    if(bunkerTimeLeft<=0){
      clearInterval(bunkerTimer);bunkerRunning=false;
      bunkerHistory.sesiones.push({fecha:isoNow(),minutos:mins});
      save(KEYS.bunkerHistory,bunkerHistory);
      addXP(50);addGold(25);
      Audio.play('success');
      showToast(`BUNKER COMPLETADO. ERES UN SOLDADO, ${P.userName}.`,'cyan',5000);
      addLog(`BUNKER: Sesión ${mins} min completada. +50 XP.`);
      renderBunker();
    }
  },1000);
  
  renderBunker();
  addLog(`BUNKER: Sesión de ${mins} min iniciada.`);
}

function cancelBunker(){
  clearInterval(bunkerTimer);bunkerRunning=false;bunkerTimeLeft=0;
  takeDamage(10,'Aborto de Bunker');
  showToast('Sesión abortada. -10 HP.','red');
  addLog('BUNKER: Sesión abortada. -10 HP.');
  renderBunker();
}

// Visibility API for Bunker
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&bunkerRunning){
    bunkerEscapes++;
    bunkerHistory.escapes.push({fecha:isoNow()});
    save(KEYS.bunkerHistory,bunkerHistory);
  }
  if(!document.hidden&&bunkerRunning&&bunkerEscapes>0){
    takeDamage(10,'Deserción en Bunker');
    Audio.play('alarm');
    try{navigator.vibrate([200,100,200,100,200]);}catch(e){}
    showModal(`
      <div class="modal-title text-red">DESERCIÓN DETECTADA</div>
      <div class="modal-text">Has abandonado el foco. -10 HP automático.<br>Intentos de escape: ${bunkerEscapes}</div>
      <div class="modal-actions"><button class="btn btn-red" onclick="closeModal()">ENTENDIDO</button></div>
    `);
    addLog(`BUNKER: Deserción detectada. -10 HP. Escapes: ${bunkerEscapes}`);
    bunkerEscapes=0;
  }
});

// ─── PSYCH PROFILE ───
function renderPsychProfile(){
  const logs=combatLog;
  const infLogs=logs.filter(l=>l.msg.includes('INFRACCIÓN'));
  
  // Day of week analysis
  const dayCounts=[0,0,0,0,0,0,0];
  const dayNames=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  infLogs.forEach(l=>{const d=new Date(l.time);dayCounts[d.getDay()]++;});
  const maxDay=dayCounts.indexOf(Math.max(...dayCounts));
  
  // Most frequent infraction
  const infCounts={};
  infLogs.forEach(l=>{
    const match=l.msg.match(/INFRACCIÓN: (.+?)\./);
    if(match)infCounts[match[1]]=(infCounts[match[1]]||0)+1;
  });
  const topInf=Object.entries(infCounts).sort((a,b)=>b[1]-a[1]);
  
  // Best habit
  const bestHab=habitos.reduce((a,b)=>a.totalCompletado>b.totalCompletado?a:b,habitos[0]);
  
  return`
    <div class="card">
      <div class="text-purple text-sm mb4">PERFIL PSICOLÓGICO</div>
      <div class="text-dim text-xs" style="line-height:1.8;">
        Punto de ruptura: ${dayNames[maxDay]}<br>
        ${topInf.length?`Trigger principal: ${topInf[0][0]} (${topInf[0][1]}x)<br>`:''}
        Racha promedio: ${P.mejorRacha?Math.round(P.mejorRacha/Math.max(1,P.totalMuertes+1)):P.racha} días<br>
        ${bestHab?`Hábito más completado: ${bestHab.nombre} (${bestHab.totalCompletado}x)<br>`:''}
        Infracciones más frecuentes: ${topInf.slice(0,3).map(([n,c])=>`${n}(${c}x)`).join(', ')||'Ninguna'}<br>
      </div>
    </div>
  `;
}

// ─── HEATMAP ───
function updateHeatmapToday(){
  const key=today();
  const habDone=habitos.filter(h=>h.completadoHoy).length;
  const habTotal=habitos.length;
  const infHoy=infracciones.reduce((s,i)=>s+i.contadorHoy,0);
  const pct=habTotal?habDone/habTotal:0;
  let score=0;
  if(pct===1&&infHoy===0)score=4;
  else if(pct>=.7&&infHoy<=1)score=3;
  else if(infHoy>=4)score=0;
  else if(infHoy>2||pct<.4)score=1;
  else score=2;
  heatmap[key]=score;
  save(KEYS.heatmap,heatmap);
}

function renderHeatmap(){
  const colors=['#ff0033','#ff6b00','#ffd700','#90EE90','#006400'];
  const d=new Date();
  let html='<div class="text-dim text-xs mt8 mb4">ÚLTIMOS 30 DÍAS</div><div style="display:flex;gap:2px;flex-wrap:wrap;">';
  for(let i=29;i>=0;i--){
    const dd=new Date(d);dd.setDate(dd.getDate()-i);
    const key=dd.toDateString();
    const score=heatmap[key];
    const color=score!==undefined?colors[score]:'#111';
    html+=`<div class="hm-cell" style="background:${color};" title="${dateStr(dd)}: ${score!==undefined?['Crítico','Malo','Neutral','Bueno','Perfecto'][score]:'Sin datos'}"></div>`;
  }
  html+='</div>';
  return html;
}

function renderHeatmapFull(){
  const colors=['#ff0033','#ff6b00','#ffd700','#90EE90','#006400'];
  let html='<div class="heatmap">';
  const d=new Date();
  for(let i=364;i>=0;i--){
    const dd=new Date(d);dd.setDate(dd.getDate()-i);
    const key=dd.toDateString();
    const score=heatmap[key];
    const color=score!==undefined?colors[score]:'#111';
    html+=`<div class="hm-cell" style="background:${color};" title="${dateStr(dd)}"></div>`;

}

function comprarItem(id){

  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.player){
        P=data.player;habitos=data.habitos||habitos;infracciones=data.infracciones||infracciones;
        objetivos=data.objetivos||objetivos;skills=data.skills||skills;combatLog=data.log||combatLog;
        muertos=data.muertos||muertos;manifiesto=data.manifiesto||manifiesto;valores=data.valores||valores;

      }else{showToast('Archivo de backup inválido.','red');}
    }catch(err){showToast('Error al leer el backup.','red');}
  };

}

// ─── DAILY RESET ───
function checkDailyReset(){
  const hoy=today();
  if(P.ultimoLogin&&P.ultimoLogin!==hoy){
    // New day
    const ayer=P.ultimoLogin;
    
    // Check streak
    const habDoneYesterday=habitos.some(h=>h.ultimaVez&&new Date(h.ultimaVez).toDateString()===ayer);
    if(habDoneYesterday){
      P.racha++;
      if(P.racha>P.mejorRacha)P.mejorRacha=P.racha;
      if(P.racha===7){
        showToast(`SIETE DÍAS SIN DOBLEGARSE. ERES UNA MÁQUINA, ${P.userName}.`,'cyan',5000);
      }
    }else{
      if(P.racha>=7){
        showToast(`RACHA DE ${P.racha} DÍAS ROTA. Has perdido todo lo que construiste.`,'red',6000);
      }
      P.racha=0;
      takeDamage(20,'Racha rota — Sin actividad ayer');
    }
    
    // Reset daily habits
    habitos.forEach(h=>{
      if(h.tipo==='daily'){
        if(!h.completadoHoy)h.streak=0;
        h.completadoHoy=false;
      }
    });
    
    // Reset infraction daily counters
    infracciones.forEach(i=>i.contadorHoy=0);
    
    // Reset daily flags
    P.precioDeHoy=null;
    P.labyrinthDone=null;
    
    addLog('NUEVO DÍA — Reset diario ejecutado.');
  }
  P.ultimoLogin=hoy;
  saveAll();
}

// ─── ONBOARDING ───
async function runOnboarding(){
  const ob=$('#onboarding');
  ob.classList.remove('hidden');
  const text=document.createElement('div');
  text.id='ob-text';
  ob.appendChild(text);
  
  await typeText(text,'KRONOS OMEGA v3.0',40);
  await new Promise(r=>setTimeout(r,400));
  text.textContent+='\nSISTEMA DE CONTROL PERSONAL';
  await new Promise(r=>setTimeout(r,400));
  text.textContent+='\n════════════════════════════';
  await new Promise(r=>setTimeout(r,600));
  text.textContent+='\nPROTOCOLO DE IDENTIFICACIÓN INICIADO...';
  await new Promise(r=>setTimeout(r,800));
  
  text.textContent+='\n\nIDENTIFÍCATE, OPERATIVO:';
  const input=document.createElement('input');
  input.id='ob-input';input.type='text';input.autocomplete='off';
  input.style.display='block';
  ob.appendChild(input);
  input.focus();
  
  return new Promise(resolve=>{
    input.addEventListener('keydown',async function handler(e){
      if(e.key==='Enter'){
        const name=input.value.trim();
        if(!name)return;
        input.removeEventListener('keydown',handler);
        input.style.display='none';
        
        text.textContent='';
        await typeText(text,`BIENVENIDO, AGENTE ${name.toUpperCase()}.`,30);
        await new Promise(r=>setTimeout(r,300));
        text.textContent+='\nTU HISTORIAL COMIENZA HOY.';
        await new Promise(r=>setTimeout(r,300));
        text.textContent+='\nNO HAY VUELTA ATRÁS.';
        await new Promise(r=>setTimeout(r,500));
        text.textContent+='\nINICIALIZANDO SISTEMAS...';
        await new Promise(r=>setTimeout(r,400));
        
        // Progress bar
        const bar=document.createElement('div');
        bar.style.cssText='margin-top:15px;font-size:12px;color:var(--color-neon-green);';
        ob.appendChild(bar);
        for(let i=0;i<=20;i++){
          bar.textContent='['+('█'.repeat(i)+'░'.repeat(20-i))+'] '+Math.round(i/20*100)+'%';
          await new Promise(r=>setTimeout(r,80));
        }
        
        await new Promise(r=>setTimeout(r,400));
        text.textContent+='\n\nKRONOS OMEGA OPERATIVO.';
        
        await new Promise(r=>setTimeout(r,1000));
        
        // Initialize player
        P=defaultPlayer(name);
        habitos=defaultHabitos();
        infracciones=defaultInfracciones();
        mercado=defaultMercado();
        valores=defaultValores();
        saveAll();
        
        ob.style.transition='opacity 1s';
        ob.style.opacity='0';
        setTimeout(()=>{ob.classList.add('hidden');ob.style.opacity='1';resolve();},1000);
      }
    });
  });
}

// ─── WEEKLY VERDICT ───
function checkWeeklyVerdict(){
  const now=new Date();
  if(now.getDay()===1){ // Monday
    const weekKey='verdict_week_'+getWeekNum();
    if(load(weekKey,false))return;
    save(weekKey,true);
    
    const weekLogs=combatLog.filter(l=>daysBetween(l.time,now)<=7);
    const codDays=new Set(weekLogs.filter(l=>l.msg.includes('CÓDIGO')).map(l=>new Date(l.time).toDateString())).size;
    const totalInf=weekLogs.filter(l=>l.msg.includes('INFRACCIÓN')).length;
    const bunkerSes=bunkerHistory.sesiones.filter(s=>daysBetween(s.fecha,now)<=7).length;
    
    const grade=codDays>=6?'EXCELENTE':codDays>=4?'ACEPTABLE':codDays>=2?'INSUFICIENTE':'DESASTROSO';
    const penalty=codDays<4?50:0;
    if(penalty)P.xp=Math.max(0,P.xp-penalty);
    
    showModal(`
      <div class="modal-title">VEREDICTO — SEMANA ${getWeekNum()}</div>
      <div class="text-dim text-sm" style="line-height:1.8;">
        RENDIMIENTO OPERATIVO:<br>
        → Código completado: ${codDays}/7 días [${grade}]<br>
        → Infracciones totales: ${totalInf} [${totalInf<=2?'LIMPIO':totalInf<=5?'PREOCUPANTE':'CRÍTICO'}]<br>
        → Bunker sesiones: ${bunkerSes} [${bunkerSes>=5?'SÓLIDO':'MEJORABLE'}]<br>
        <br>
        SENTENCIA: ${grade}<br>
        ${penalty?`Penalización: -${penalty} XP`:'Sin penalización esta semana.'}
      </div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">ACEPTAR VEREDICTO</button></div>
    `);
    saveAll();
  }
}

// ─── HEATMAP UPDATE ───
function updateHeatmapToday(){
  const key=today();
  const habDone=habitos.filter(h=>h.completadoHoy).length;
  const habTotal=habitos.length;
  const infHoy=infracciones.reduce((s,i)=>s+i.contadorHoy,0);
  const pct=habTotal?habDone/habTotal:0;
  let score=2;
  if(pct===1&&infHoy===0)score=4;
  else if(pct>=.7&&infHoy<=1)score=3;
  else if(infHoy>=4)score=0;
  else if(infHoy>2||pct<.4)score=1;
  heatmap[key]=score;
  save(KEYS.heatmap,heatmap);
}

// ─── RENDER ALL ───
function renderAll(){
  renderHeader();renderNav();renderSection(currentSection);
}

// ─── PWA: SERVICE WORKER + MANIFEST ───
function registerPWA(){
  // Manifest
  const manifest={
    name:'KRONOS OMEGA',short_name:'KRONOS',
    description:'Sistema de Control Personal Extremo',
    start_url:'.',display:'standalone',
    background_color:'#000000',theme_color:'#00ff41',
    orientation:'portrait',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" fill="#000"/><text x="96" y="110" text-anchor="middle" font-size="80" fill="#00ff41" font-family="monospace">K</text></svg>'),sizes:'192x192',type:'image/svg+xml'},
      {src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="#000"/><text x="256" y="300" text-anchor="middle" font-size="220" fill="#00ff41" font-family="monospace">K</text></svg>'),sizes:'512x512',type:'image/svg+xml'}]
  };
  const mBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const mLink=document.createElement('link');
  mLink.rel='manifest';mLink.href=URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);
  
  // Service Worker
  if('serviceWorker' in navigator){
    try{
      const swCode=`
        const CACHE='kronos-v3';
        self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});
        self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
        self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));});
      `;
      const swBlob=new Blob([swCode],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    }catch(e){}
  }
}

  Audio.init();
  loadAll();
  
  if(!P){
    await runOnboarding();
    loadAll();
  }
  
  checkDailyReset();
  
  $('#app').classList.remove('hidden');
  renderAll();
  navigate('codigo');
  
  checkLabyrinth();
  checkCapsula();

  // Streak messages

      `IMPARABLE. QUE NO SE ROMPA.`
    ];
    setTimeout(()=>showToast(msgs[Math.floor(Math.random()*msgs.length)],'cyan',5000),2000);
  }
  
  registerPWA();
}
